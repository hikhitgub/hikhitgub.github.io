<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Transcriptor Simple</title>
</head>
<body>

    <h1>Transcriptor de YouTube</h1>
    
    <!-- Caja para pegar el enlace -->
    <input type="text" id="urlInput" placeholder="Pega el enlace de YouTube aquí" style="width: 350px;">
    
    <!-- Botón que activa la función JavaScript -->
    <button onclick="enviarAlServidor()">Transcribir</button>

    <h3>Estado / Resultado:</h3>
    <!-- Aquí se mostrará el estado y luego el texto transcrito -->
    <p id="resultado" style="white-space: pre-wrap; font-family: monospace;">Escribe un enlace y presiona Transcribir.</p>

    <script>
        async function enviarAlServidor() {
            const url = document.getElementById("urlInput").value.strip ? document.getElementById("urlInput").value.strip() : document.getElementById("urlInput").value;
            const resultado = document.getElementById("resultado");

            if (!url) {
                resultado.innerText = "❌ Por favor, ingresa una URL.";
                return;
            }

            resultado.innerText = "⏳ Descargando y transcribiendo... (Esto puede tomar de 1 a 3 minutos)";

            try {
                // Hacemos una petición POST al servidor local (http://127.0.0.1:8000/transcribir)
                const respuesta = await fetch("http://127.0.0.1:8000/transcribir", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ url: url })
                });

                if (!respuesta.ok) {
                    throw new Error("Error en el servidor");
                }

                const datos = await respuesta.json();
                
                // Mostramos la transcripción devuelta por el servidor
                resultado.innerText = datos.transcripcion;

            } catch (error) {
                resultado.innerText = "❌ Ocurrió un error: " + error.message;
            }
        }
    </script>

</body>
</html>
